<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SmartTech Store</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<h1>SmartTech Store</h1>

<div class="controls">

<input id="search" class="search-input" type="text" placeholder="🔍 Search phones...">

<select id="sort">
<option value="">Sort</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
</select>

<button id="themeToggle">🌙</button>

<button onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>

</div>

</header>

<section class="hero">
  <div class="hero-content">
    <h2>Next-Gen Smartphones</h2>
    <p>Find the perfect phone for your lifestyle</p>
    <button onclick="filterCategory('all')">Explore Phones</button>
  </div>
</section>

<section class="featured">
<h2>🔥 Featured Phone</h2>
<div class="featured-card">
<img src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab?w=600">
<div class="featured-info">
<h3>iPhone 15 Pro</h3>
<p>Powerful A17 Pro chip, Pro camera system and stunning titanium design.</p>
<button onclick="filterCategory('apple')">Shop Apple</button>
</div>
</div>
</section>
  
<div class="filters">

<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('apple')">Apple</button>
<button onclick="filterCategory('samsung')">Samsung</button>
<button onclick="filterCategory('xiaomi')">Xiaomi</button>
<button onclick="filterCategory('gaming')">Gaming Phones</button>
<button onclick="filterCategory('budget')">Budget Phones</button>

</div>


<section class="products" id="product-list"></section>

<h2 id="no-products">No products found 😕</h2>


<div id="popup">Added to Cart ✅</div>


<div id="cart-overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">

<div class="cart-header">
<h2>Your Cart</h2>
<button onclick="toggleCart()">✖</button>
</div>

<div class="cart-items" id="cart-items"></div>

<div class="cart-footer">
<h3>Total ₹<span id="cart-total">0</span></h3>
</div>

</div>

<script src="script.js"></script>

</body>

</html>
